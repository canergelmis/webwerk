<!DOCTYPE html>
<!--
  WEBWERK · LAB v2 — "computational craft" hero PROTOTYPE.
  GPU particle system (Three.js) forms the wordmark WEBWERK, then dissolves into a flowing
  abstract field; cursor-reactive; over a living fbm-aurora shader background (single WebGL context,
  two render passes). Self-playing: assemble → hold → dissolve. Static GitHub-Pages-safe.
  Fallbacks: no-WebGL → CSS gradient + static wordmark; prefers-reduced-motion → static formed state.
-->
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Webwerk · Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#06070b;--paper:#eef1f8;--accent:#5b6cff;--accent2:#9fb0ff;--muted:#7a8298}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--ink);color:var(--paper);font-family:'Inter',system-ui,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  #gl{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
  .fallback{position:fixed;inset:0;z-index:0;display:none;align-items:center;justify-content:center;
    background:radial-gradient(60% 70% at 30% 25%,rgba(91,108,255,.45),transparent 60%),radial-gradient(50% 60% at 80% 75%,rgba(159,176,255,.3),transparent 60%),linear-gradient(160deg,#06070b,#0b1230 60%,#06070b)}
  .fallback .wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(2.6rem,11vw,8rem);letter-spacing:-.03em}
  .no-webgl .fallback{display:flex}.no-webgl #gl{display:none}

  .shell{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;pointer-events:none}
  .shell a,.shell button{pointer-events:auto}
  .top{display:flex;align-items:center;justify-content:space-between;padding:24px clamp(20px,5vw,52px)}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem}
  .brand .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);transform:rotate(45deg);box-shadow:0 0 22px 2px var(--accent)}
  .top .tag{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
  .spacer{height:clamp(140px,30vh,260px)}  /* leaves room where particle wordmark sits */
  .eyebrow{font-family:'Space Mono',monospace;font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--accent2);opacity:0;animation:fade 1s 3.4s forwards}
  .tagline{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:clamp(1.1rem,2.6vw,1.7rem);letter-spacing:-.01em;color:#d4d9e8;max-width:24ch;margin-top:18px;opacity:0;animation:fade 1.1s 3.7s forwards}
  .cue{margin-top:40px;font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;animation:fade 1s 4.2s forwards}
  .cue .bar{display:block;width:1px;height:34px;margin:12px auto 0;background:linear-gradient(var(--accent2),transparent);animation:drop 1.8s ease-in-out infinite}
  @keyframes fade{to{opacity:1}}
  @keyframes drop{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
  @media(prefers-reduced-motion:reduce){.eyebrow,.tagline,.cue{animation:none;opacity:1}.cue .bar{animation:none}}

  .replay{position:fixed;right:clamp(16px,4vw,40px);bottom:clamp(16px,4vw,40px);z-index:5;font-family:'Space Mono',monospace;
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:.6em 1em;cursor:pointer;backdrop-filter:blur(8px);transition:.18s}
  .replay:hover{color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="fallback"><div class="wm">WEBWERK</div></div>

<div class="shell">
  <div class="top">
    <div class="brand"><span class="dot"></span>Webwerk</div>
    <div class="tag">Lab · prototype</div>
  </div>
  <div class="stage">
    <div class="spacer"></div>
    <p class="eyebrow">Studio web · Luxembourg</p>
    <p class="tagline">On conçoit des sites qui ne ressemblent à aucun autre.</p>
    <div class="cue">Bougez la souris<span class="bar"></span></div>
  </div>
</div>
<button class="replay" id="replay">↺ Rejouer</button>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const canvas = document.getElementById('gl');
let renderer;
try { renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:false}); }
catch(e){ document.documentElement.classList.add('no-webgl'); }

if(renderer){
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
  renderer.setSize(innerWidth, innerHeight);
  renderer.autoClear = false;

  // ---------- background: fbm aurora on a fullscreen ortho quad ----------
  const bgScene = new THREE.Scene();
  const bgCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const bgMat = new THREE.ShaderMaterial({
    uniforms:{ u_res:{value:new THREE.Vector2()}, u_time:{value:0}, u_mouse:{value:new THREE.Vector2(.5,.5)}, u_acc:{value:new THREE.Vector3(0.18,0.24,1.0)} },
    vertexShader:`void main(){ gl_Position=vec4(position.xy,0.,1.); }`,
    fragmentShader:`precision highp float; uniform vec2 u_res; uniform float u_time; uniform vec2 u_mouse; uniform vec3 u_acc;
      float h(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
      float n(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);
        return mix(mix(h(i),h(i+vec2(1,0)),u.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),u.x),u.y);}
      float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.02;a*=.5;}return v;}
      void main(){ vec2 p=(gl_FragCoord.xy-.5*u_res)/u_res.y; float t=u_time*0.035; vec2 m=(u_mouse-.5)*1.1;
        vec2 q=vec2(fbm(p*1.4+t),fbm(p*1.4+vec2(5.2,1.3)-t));
        vec2 r=vec2(fbm(p*1.4+2.*q+m+vec2(1.7,9.2)),fbm(p*1.4+2.*q+m+vec2(8.3,2.8)));
        float f=fbm(p*1.4+2.4*r+t);
        vec3 col=mix(vec3(0.02,0.025,0.045),vec3(0.03,0.06,0.18),clamp(f*1.3,0.,1.));
        col+=u_acc*smoothstep(0.55,0.95,f+0.25*length(r-0.5))*0.7;
        col+=u_acc*smoothstep(0.6,0.0,length(p-m*0.6))*0.18;
        col*=1.0-0.45*dot(p,p); gl_FragColor=vec4(col,1.); }`,
    depthTest:false, depthWrite:false
  });
  bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), bgMat));

  // ---------- particles ----------
  const scene = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
  cam.position.z = 18;

  function visibleWidth(z){ const h=2*Math.tan((cam.fov*Math.PI/180)/2)*(cam.position.z-z); return h*cam.aspect; }

  // sample WEBWERK into points
  function buildTargets(){
    const c=document.createElement('canvas'); const cx=c.getContext('2d');
    const W=1000, H=300; c.width=W; c.height=H;
    cx.fillStyle='#fff'; cx.textAlign='center'; cx.textBaseline='middle';
    let fs=210; cx.font=`700 ${fs}px 'Space Grotesk', Arial, sans-serif`;
    // shrink to fit width
    while(cx.measureText('WEBWERK').width > W*0.92 && fs>40){ fs-=6; cx.font=`700 ${fs}px 'Space Grotesk', Arial, sans-serif`; }
    cx.fillText('WEBWERK', W/2, H/2+4);
    const img=cx.getImageData(0,0,W,H).data;
    const pts=[]; const step = innerWidth<700 ? 3 : 2;
    for(let y=0;y<H;y+=step){ for(let x=0;x<W;x+=step){ if(img[(y*W+x)*4+3]>128){ pts.push([x,y]); } } }
    // shuffle + cap
    for(let i=pts.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[pts[i],pts[j]]=[pts[j],pts[i]];}
    const cap = innerWidth<700 ? 12000 : 24000;
    const used = pts.slice(0, Math.min(cap, pts.length));
    // map to world
    const targetW = visibleWidth(0)*0.78; const scale=targetW/W;
    const N=used.length;
    const aTarget=new Float32Array(N*3), pos=new Float32Array(N*3), aRand=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const wx=(used[i][0]-W/2)*scale, wy=-(used[i][1]-H/2)*scale;
      aTarget[i*3]=wx; aTarget[i*3+1]=wy + visibleWidth(0)*0.06; aTarget[i*3+2]=(Math.random()-0.5)*0.4;
      // scattered start: wide sphere
      const a=Math.random()*6.283, b=Math.acos(2*Math.random()-1), rr=10+Math.random()*16;
      pos[i*3]=rr*Math.sin(b)*Math.cos(a); pos[i*3+1]=rr*Math.sin(b)*Math.sin(a); pos[i*3+2]=rr*Math.cos(b)-6;
      aRand[i*3]=Math.random(); aRand[i*3+1]=Math.random(); aRand[i*3+2]=Math.random();
    }
    return {aTarget,pos,aRand,N};
  }
  let {aTarget,pos,aRand,N}=buildTargets();
  try{ let xn=1e9,xx=-1e9,yn=1e9,yx=-1e9; for(let i=0;i<N;i++){const x=aTarget[i*3],y=aTarget[i*3+1];if(x<xn)xn=x;if(x>xx)xx=x;if(y<yn)yn=y;if(y>yx)yx=y;}
    window.__dbg={stage:'initial',N, x:[+xn.toFixed(2),+xx.toFixed(2)], y:[+yn.toFixed(2),+yx.toFixed(2)]}; }catch(e){ window.__err=String(e); }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aTarget', new THREE.BufferAttribute(aTarget,3));
  geo.setAttribute('aRand', new THREE.BufferAttribute(aRand,3));

  const mat=new THREE.ShaderMaterial({
    uniforms:{ uTime:{value:0}, uAssemble:{value:0}, uDissolve:{value:0}, uMouse:{value:new THREE.Vector3(999,999,0)},
               uSize:{value: innerWidth<700?1.3:1.7}, uPix:{value:Math.min(devicePixelRatio,1.6)},
               uA1:{value:new THREE.Color(0x5b6cff)}, uA2:{value:new THREE.Color(0xa8b6ff)}, uA3:{value:new THREE.Color(0xe9ecff)} },
    vertexShader:`
      attribute vec3 aTarget; attribute vec3 aRand;
      uniform float uTime,uAssemble,uDissolve,uSize,uPix; uniform vec3 uMouse;
      varying float vMix;
      void main(){
        vec3 tp = mix(position, aTarget, uAssemble);
        // breathing
        tp += 0.05*sin(uTime*0.8 + aRand.x*6.2831) * vec3(aRand.y-0.5, aRand.z-0.5, aRand.x-0.5);
        // dissolve into flowing abstract field
        vec3 fl;
        fl.x = sin(aTarget.y*0.9 + uTime*0.6 + aRand.x*6.2831);
        fl.y = cos(aTarget.x*0.9 + uTime*0.5 + aRand.y*6.2831);
        fl.z = sin((aTarget.x+aTarget.y)*0.7 + uTime*0.4 + aRand.z*6.2831);
        tp += fl * uDissolve * (0.7 + aRand.z*2.2);
        tp += normalize(aTarget+0.001) * uDissolve * aRand.x * 2.0;
        // cursor repulsion (screen-plane)
        vec2 d = tp.xy - uMouse.xy; float dist=length(d);
        float force = smoothstep(3.2,0.0,dist);
        tp.xy += normalize(d+0.0001) * force * 2.4;
        tp.z += force*1.5;
        vMix = aRand.y*0.6 + uDissolve*0.4 + force*0.5;
        vec4 mv = modelViewMatrix * vec4(tp,1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = uSize * uPix * (22.0 / -mv.z);
      }`,
    fragmentShader:`
      precision highp float; uniform vec3 uA1,uA2,uA3; uniform float uDissolve; varying float vMix;
      void main(){
        float a = smoothstep(0.5,0.2,length(gl_PointCoord-0.5));
        if(a<=0.001) discard;
        vec3 col = mix(uA1,uA2,clamp(vMix,0.,1.));
        col = mix(col,uA3,smoothstep(0.7,1.0,vMix));
        gl_FragColor = vec4(col, a*(0.95-uDissolve*0.2));
      }`,
    transparent:true, depthTest:false, depthWrite:false, blending:THREE.AdditiveBlending
  });
  const points=new THREE.Points(geo,mat); scene.add(points);

  // ---------- interaction + timeline ----------
  const mouse=new THREE.Vector2(.5,.5), mWorld=new THREE.Vector3(999,999,0);
  addEventListener('pointermove',e=>{
    mouse.set(e.clientX/innerWidth, 1-e.clientY/innerHeight);
    const vw=visibleWidth(0), vh=vw/cam.aspect;
    mWorld.set((mouse.x-0.5)*vw, (mouse.y-0.5)*vh, 0);
  },{passive:true});
  addEventListener('pointerleave',()=>mWorld.set(999,999,0));

  let t0=performance.now()/1000, phase=0;
  function startTimeline(){ t0=performance.now()/1000; }
  document.getElementById('replay').addEventListener('click', startTimeline);

  // Rebuild targets once the web font is actually loaded (module ran before fonts ready)
  function rebuild(){
    const r=buildTargets(); aTarget=r.aTarget; pos=r.pos; aRand=r.aRand; N=r.N;
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    geo.setAttribute('aTarget', new THREE.BufferAttribute(aTarget,3));
    geo.setAttribute('aRand', new THREE.BufferAttribute(aRand,3));
    geo.attributes.position.needsUpdate=geo.attributes.aTarget.needsUpdate=geo.attributes.aRand.needsUpdate=true;
    // debug: report target bounds so we can confirm the wordmark shape
    let xn=1e9,xx=-1e9,yn=1e9,yx=-1e9; for(let i=0;i<N;i++){const x=aTarget[i*3],y=aTarget[i*3+1];if(x<xn)xn=x;if(x>xx)xx=x;if(y<yn)yn=y;if(y>yx)yx=y;}
    window.__dbg={N, x:[+xn.toFixed(2),+xx.toFixed(2)], y:[+yn.toFixed(2),+yx.toFixed(2)], vw:+visibleWidth(0).toFixed(2)};
    startTimeline();
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(rebuild); }
  addEventListener('resize', ()=>{ clearTimeout(window.__rb); window.__rb=setTimeout(rebuild,250); }, {passive:true});

  function ease(x){ return x<0 ? 0 : x>1 ? 1 : x*x*(3-2*x); }

  function resize(){
    renderer.setSize(innerWidth,innerHeight);
    cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
    bgMat.uniforms.u_res.value.set(canvas.width,canvas.height);
  }
  addEventListener('resize',resize,{passive:true}); resize();

  if(reduce){ mat.uniforms.uAssemble.value=1; } // static formed state

  // debug/verification hook: freeze an exact phase
  let __freeze=false;
  window.__setPhase=(a,d)=>{ __freeze=true; mat.uniforms.uAssemble.value=a; mat.uniforms.uDissolve.value=d; };
  window.__unfreeze=()=>{ __freeze=false; startTimeline(); };

  let raf;
  function loop(){
    const now=performance.now()/1000, t=now-t0;
    bgMat.uniforms.u_time.value=now; bgMat.uniforms.u_mouse.value.copy(mouse);
    mat.uniforms.uTime.value=now; mat.uniforms.uMouse.value.copy(mWorld);
    if(!reduce && !__freeze){
      // timeline: assemble 0-2.6s, hold to 4.2s, dissolve 4.2-8s -> rest ~0.55
      mat.uniforms.uAssemble.value = ease(t/2.6);
      let diss = t<4.2 ? 0 : ease((t-4.2)/3.8)*0.6;
      mat.uniforms.uDissolve.value = diss;
    }
    renderer.clear();
    renderer.render(bgScene,bgCam);
    renderer.render(scene,cam);
    raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) cancelAnimationFrame(raf); else { t0+=0; raf=requestAnimationFrame(loop);} });
}
</script>
</body>
</html>
