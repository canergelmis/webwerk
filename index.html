<!DOCTYPE html>
<!--
  WEBWERK — Luxembourg web studio. Computational-craft single page (FR default · EN). INDEXABLE.
  Hero: GPU particle system forms WEBWERK then dissolves into a flowing field, over an fbm aurora;
  cursor-reactive (parallax tilt + spring-back); cobalt→violet gradient + shimmer.
  Refined sections beneath. Fallbacks: no-WebGL → CSS gradient + static wordmark; reduced-motion → static.
  Single self-contained file, libs from CDN, GitHub-Pages-safe. Point webwerk.lu when registered.
-->
<html lang="fr">
<head>
<script>document.documentElement.classList.add('js');</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webwerk — Studio web au Luxembourg · sites sur-mesure</title>
<meta name="description" content="Webwerk est un studio web luxembourgeois. Nous concevons, hébergeons et entretenons des sites sur-mesure, rapides et multilingues (FR/DE/EN) — pour les restaurants, commerces et indépendants. Vous voyez votre site avant de payer." />
<link rel="canonical" href="https://webwerk.lu/" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Webwerk — Studio web au Luxembourg" />
<meta property="og:description" content="Des sites web qui ne ressemblent à aucun autre. Vous voyez votre site avant de payer." />
<meta property="og:locale" content="fr_LU" />
<meta name="theme-color" content="#06070b" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#06070b; --ink2:#0d111b; --paper:#eef1f8; --paper-d:#c7ccd8;
    --accent:#3247ff; --accent2:#7b8cff; --violet:#9b6cff; --muted:#7a8298; --line:#1c2230;
    --maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--ink);color:var(--paper);font-family:'Inter',system-ui,sans-serif;font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  a{color:inherit;text-decoration:none}
  .grotesk{font-family:'Space Grotesk',system-ui,sans-serif}
  .label{font-family:'Space Mono',monospace;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent2)}

  .btn{display:inline-flex;align-items:center;gap:.5em;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.96rem;padding:.78em 1.6em;border-radius:9px;border:1.5px solid transparent;transition:.2s;cursor:pointer;white-space:nowrap}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-accent:hover{background:#1f31d6;transform:translateY(-2px);box-shadow:0 14px 30px -12px var(--accent)}
  .btn-ghost{border-color:#2a3346;color:var(--paper)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent2)}

  /* ---- background canvas (hero only, fixed behind hero) ---- */
  #gl{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
  .fallback-hero{position:fixed;inset:0;z-index:0;display:none;align-items:center;justify-content:center;
    background:radial-gradient(55% 65% at 28% 25%,rgba(50,71,255,.45),transparent 60%),radial-gradient(50% 60% at 82% 72%,rgba(155,108,255,.3),transparent 60%),linear-gradient(160deg,#06070b,#0b1230 60%,#06070b)}
  .fallback-hero .wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(2.6rem,12vw,9rem);letter-spacing:-.03em;background:linear-gradient(90deg,var(--accent2),#fff,var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
  .no-webgl #gl{display:none}.no-webgl .fallback-hero{display:flex}

  header{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .3s,border-color .3s}
  header.solid{background:rgba(6,7,11,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:74px;gap:14px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.3rem}
  .brand .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);transform:rotate(45deg);box-shadow:0 0 22px 2px var(--accent)}
  .nav-links{display:flex;gap:30px;align-items:center}
  .nav-links a{font-weight:500;font-size:.95rem;color:#aeb6c8;transition:.2s}
  .nav-links a:hover{color:#fff}
  .nav-cta{display:flex;gap:12px;align-items:center}
  .lang-switch{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:none}
  .lang-switch button{font-family:'Space Mono',monospace;font-weight:700;font-size:.74rem;padding:.5em .68em;background:none;border:0;cursor:pointer;color:var(--muted);transition:.18s}
  .lang-switch button.active{background:var(--paper);color:var(--ink)}
  .burger-ico{display:none;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer}
  .burger-ico span{width:26px;height:2.5px;background:var(--paper);border-radius:2px}

  /* ---- hero ---- */
  .hero{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;pointer-events:none}
  .hero .spacer{height:clamp(150px,32vh,300px)}
  .hero .eyebrow{opacity:0;animation:fade 1s 3.4s forwards}
  .hero .tagline{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:clamp(1.15rem,2.7vw,1.9rem);letter-spacing:-.01em;color:#d4d9e8;max-width:22ch;margin-top:18px;opacity:0;animation:fade 1.1s 3.7s forwards}
  .hero .cue{margin-top:42px;opacity:0;animation:fade 1s 4.3s forwards}
  .hero .cue .bar{display:block;width:1px;height:36px;margin:0 auto;background:linear-gradient(var(--accent2),transparent);animation:drop 1.9s ease-in-out infinite}
  @keyframes fade{to{opacity:1}}
  @keyframes drop{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

  /* sections placeholder (T4 fills this) */
  #content{position:relative;z-index:2;background:var(--ink)}

  @keyframes fadeNow{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){
    .hero .eyebrow,.hero .tagline,.hero .cue{animation:none;opacity:1}
    .hero .cue .bar{animation:none}
  }
  @media(max-width:860px){
    .nav-links{display:none}.burger-ico{display:flex}
    .mobile-open .nav-links{display:flex;position:absolute;top:74px;left:0;right:0;flex-direction:column;gap:0;background:rgba(6,7,11,.96);border-bottom:1px solid var(--line);padding:8px 28px 18px}
    .mobile-open .nav-links a{padding:13px 0;border-bottom:1px solid var(--line)}
  }
</style>
</head>
<body>
<canvas id="gl" aria-hidden="true"></canvas>
<div class="fallback-hero" aria-hidden="true"><div class="wm">WEBWERK</div></div>

<header id="hdr">
  <div class="wrap nav">
    <a href="#top" class="brand" aria-label="Webwerk"><span class="dot"></span>Webwerk</a>
    <nav class="nav-links">
      <a href="#services" data-i18n="nav_services">Services</a>
      <a href="#process" data-i18n="nav_process">Méthode</a>
      <a href="#about" data-i18n="nav_about">À propos</a>
      <a href="#contact" data-i18n="nav_contact">Contact</a>

      <div class="lang-switch" role="group" aria-label="Langue">
        <button data-lang="fr" class="active">FR</button>
        <button data-lang="en">EN</button>
      </div>
      <a href="#contact" class="btn btn-accent" data-i18n="nav_quote">Devis gratuit</a>
      <button class="burger-ico" aria-label="Menu" onclick="document.body.classList.toggle('mobile-open')"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main id="top">
  <section class="hero" id="hero">
    <div class="spacer"></div>
    <p class="label eyebrow" data-i18n="hero_eyebrow">Studio web · Luxembourg</p>
    <p class="tagline" data-i18n="hero_tagline">On conçoit des sites qui ne ressemblent à aucun autre.</p>
    <div class="cue" aria-hidden="true"><span class="bar"></span></div>
  </section>

  <!-- T4: content sections injected here -->
  <div id="content"></div>
</main>

<!-- ===================== WebGL hero engine ===================== -->
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const canvas = document.getElementById('gl');
let renderer;
try { renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:false}); }
catch(e){ document.documentElement.classList.add('no-webgl'); }

if(renderer){
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
  renderer.setSize(innerWidth, innerHeight);
  renderer.autoClear = false;

  // background aurora
  const bgScene=new THREE.Scene(), bgCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const bgMat=new THREE.ShaderMaterial({
    uniforms:{ u_res:{value:new THREE.Vector2()}, u_time:{value:0}, u_mouse:{value:new THREE.Vector2(.5,.5)}, u_acc:{value:new THREE.Vector3(0.18,0.24,1.0)} },
    vertexShader:`void main(){ gl_Position=vec4(position.xy,0.,1.); }`,
    fragmentShader:`precision highp float; uniform vec2 u_res; uniform float u_time; uniform vec2 u_mouse; uniform vec3 u_acc;
      float h(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
      float n(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);
        return mix(mix(h(i),h(i+vec2(1,0)),u.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),u.x),u.y);}
      float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.02;a*=.5;}return v;}
      void main(){ vec2 p=(gl_FragCoord.xy-.5*u_res)/u_res.y; float t=u_time*0.035; vec2 m=(u_mouse-.5)*1.1;
        vec2 q=vec2(fbm(p*1.4+t),fbm(p*1.4+vec2(5.2,1.3)-t));
        vec2 r=vec2(fbm(p*1.4+2.*q+m+vec2(1.7,9.2)),fbm(p*1.4+2.*q+m+vec2(8.3,2.8)));
        float f=fbm(p*1.4+2.4*r+t);
        vec3 col=mix(vec3(0.02,0.025,0.045),vec3(0.03,0.06,0.18),clamp(f*1.3,0.,1.));
        col+=u_acc*smoothstep(0.55,0.95,f+0.25*length(r-0.5))*0.7;
        col+=u_acc*smoothstep(0.6,0.0,length(p-m*0.6))*0.18;
        col*=1.0-0.45*dot(p,p); gl_FragColor=vec4(col,1.); }`,
    depthTest:false, depthWrite:false
  });
  bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), bgMat));

  // particles
  const scene=new THREE.Scene(), cam=new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
  cam.position.z=18;
  function visibleWidth(z){ const h=2*Math.tan((cam.fov*Math.PI/180)/2)*(cam.position.z-z); return h*cam.aspect; }

  function buildTargets(){
    const c=document.createElement('canvas'), cx=c.getContext('2d'); const W=1000,H=300; c.width=W;c.height=H;
    cx.fillStyle='#fff'; cx.textAlign='center'; cx.textBaseline='middle';
    let fs=210; cx.font=`700 ${fs}px 'Space Grotesk', Arial, sans-serif`;
    while(cx.measureText('WEBWERK').width>W*0.92 && fs>40){ fs-=6; cx.font=`700 ${fs}px 'Space Grotesk', Arial, sans-serif`; }
    cx.fillText('WEBWERK', W/2, H/2+4);
    const img=cx.getImageData(0,0,W,H).data; const pts=[]; const step=innerWidth<700?3:2;
    for(let y=0;y<H;y+=step){ for(let x=0;x<W;x+=step){ if(img[(y*W+x)*4+3]>128) pts.push([x,y]); } }
    for(let i=pts.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[pts[i],pts[j]]=[pts[j],pts[i]];}
    const cap=innerWidth<700?12000:24000; const used=pts.slice(0,Math.min(cap,pts.length));
    const targetW=visibleWidth(0)*0.78, scale=targetW/W, N=used.length;
    const aTarget=new Float32Array(N*3), pos=new Float32Array(N*3), aRand=new Float32Array(N*3), aU=new Float32Array(N);
    let minx=1e9,maxx=-1e9; for(const u of used){ if(u[0]<minx)minx=u[0]; if(u[0]>maxx)maxx=u[0]; }
    for(let i=0;i<N;i++){
      const wx=(used[i][0]-W/2)*scale, wy=-(used[i][1]-H/2)*scale;
      aTarget[i*3]=wx; aTarget[i*3+1]=wy+visibleWidth(0)*0.06; aTarget[i*3+2]=(Math.random()-0.5)*0.4;
      aU[i]=(used[i][0]-minx)/Math.max(1,(maxx-minx)); // 0..1 across the wordmark for the gradient
      const a=Math.random()*6.283,b=Math.acos(2*Math.random()-1),rr=10+Math.random()*16;
      pos[i*3]=rr*Math.sin(b)*Math.cos(a); pos[i*3+1]=rr*Math.sin(b)*Math.sin(a); pos[i*3+2]=rr*Math.cos(b)-6;
      aRand[i*3]=Math.random(); aRand[i*3+1]=Math.random(); aRand[i*3+2]=Math.random();
    }
    return {aTarget,pos,aRand,aU,N};
  }
  let {aTarget,pos,aRand,aU,N}=buildTargets();

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aTarget', new THREE.BufferAttribute(aTarget,3));
  geo.setAttribute('aRand', new THREE.BufferAttribute(aRand,3));
  geo.setAttribute('aU', new THREE.BufferAttribute(aU,1));

  const mat=new THREE.ShaderMaterial({
    uniforms:{ uTime:{value:0}, uAssemble:{value:0}, uDissolve:{value:0}, uMouse:{value:new THREE.Vector3(999,999,0)},
               uRepel:{value:1}, uSize:{value:innerWidth<700?1.3:1.7}, uPix:{value:Math.min(devicePixelRatio,1.6)},
               uA1:{value:new THREE.Color(0x3247ff)}, uA2:{value:new THREE.Color(0x9b6cff)}, uA3:{value:new THREE.Color(0xe9ecff)} },
    vertexShader:`
      attribute vec3 aTarget; attribute vec3 aRand; attribute float aU;
      uniform float uTime,uAssemble,uDissolve,uSize,uPix,uRepel; uniform vec3 uMouse;
      varying float vMix; varying float vU; varying float vShim;
      void main(){
        vec3 tp = mix(position, aTarget, uAssemble);
        tp += 0.05*sin(uTime*0.8 + aRand.x*6.2831) * vec3(aRand.y-0.5, aRand.z-0.5, aRand.x-0.5);
        vec3 fl;
        fl.x = sin(aTarget.y*0.9 + uTime*0.6 + aRand.x*6.2831);
        fl.y = cos(aTarget.x*0.9 + uTime*0.5 + aRand.y*6.2831);
        fl.z = sin((aTarget.x+aTarget.y)*0.7 + uTime*0.4 + aRand.z*6.2831);
        tp += fl * uDissolve * (0.7 + aRand.z*2.2);
        tp += normalize(aTarget+0.001) * uDissolve * aRand.x * 2.0;
        vec2 d = tp.xy - uMouse.xy; float dist=length(d);
        float force = smoothstep(3.2,0.0,dist) * uRepel;
        tp.xy += normalize(d+0.0001) * force * 2.4;
        tp.z += force*1.5;
        vMix = aRand.y*0.6 + uDissolve*0.4 + force*0.5;
        vU = aU;
        vShim = sin(aU*16.0 - uTime*2.2)*0.5+0.5; // travelling shimmer along the wordmark
        vec4 mv = modelViewMatrix * vec4(tp,1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = uSize * uPix * (22.0 / -mv.z);
      }`,
    fragmentShader:`
      precision highp float; uniform vec3 uA1,uA2,uA3; uniform float uDissolve;
      varying float vMix; varying float vU; varying float vShim;
      void main(){
        float a = smoothstep(0.5,0.2,length(gl_PointCoord-0.5));
        if(a<=0.001) discard;
        vec3 grad = mix(uA1, uA2, clamp(vU,0.,1.));        // cobalt -> violet across letters
        grad += (vShim*0.35) * (1.0-uDissolve);            // shimmer brightening while formed
        vec3 col = mix(grad, uA3, smoothstep(0.65,1.0,vMix));
        gl_FragColor = vec4(col, a*(0.95-uDissolve*0.2));
      }`,
    transparent:true, depthTest:false, depthWrite:false, blending:THREE.AdditiveBlending
  });
  const points=new THREE.Points(geo,mat); scene.add(points);

  // interaction
  const mouse=new THREE.Vector2(.5,.5), mWorld=new THREE.Vector3(999,999,0);
  const tilt=new THREE.Vector2(0,0), tiltTarget=new THREE.Vector2(0,0);
  let repelTarget=1;
  addEventListener('pointermove',e=>{
    mouse.set(e.clientX/innerWidth, 1-e.clientY/innerHeight);
    const vw=visibleWidth(0), vh=vw/cam.aspect;
    mWorld.set((mouse.x-.5)*vw, (mouse.y-.5)*vh, 0);
    tiltTarget.set((mouse.x-.5)*0.24, (mouse.y-.5)*0.24);
    repelTarget=1;
  },{passive:true});
  addEventListener('pointerleave',()=>{ mWorld.set(999,999,0); tiltTarget.set(0,0); repelTarget=0; });

  let t0=performance.now()/1000, userScrolled=false, __freeze=false;
  function startTimeline(){ t0=performance.now()/1000; }
  window.__replay=startTimeline;
  window.__setPhase=(a,d)=>{ __freeze=true; mat.uniforms.uAssemble.value=a; mat.uniforms.uDissolve.value=d; };
  window.__unfreeze=()=>{ __freeze=false; startTimeline(); };
  window.__setDissolve=(v)=>{ if(__freeze) return; mat.uniforms.uDissolve.value=v; }; // for scroll handoff (T5)

  function rebuild(){
    const r=buildTargets(); aTarget=r.aTarget;pos=r.pos;aRand=r.aRand;aU=r.aU;N=r.N;
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    geo.setAttribute('aTarget', new THREE.BufferAttribute(aTarget,3));
    geo.setAttribute('aRand', new THREE.BufferAttribute(aRand,3));
    geo.setAttribute('aU', new THREE.BufferAttribute(aU,1));
    geo.attributes.position.needsUpdate=geo.attributes.aTarget.needsUpdate=geo.attributes.aRand.needsUpdate=geo.attributes.aU.needsUpdate=true;
    let xn=1e9,xx=-1e9,yn=1e9,yx=-1e9; for(let i=0;i<N;i++){const x=aTarget[i*3],y=aTarget[i*3+1];if(x<xn)xn=x;if(x>xx)xx=x;if(y<yn)yn=y;if(y>yx)yx=y;}
    window.__dbg={N, x:[+xn.toFixed(2),+xx.toFixed(2)], y:[+yn.toFixed(2),+yx.toFixed(2)], vw:+visibleWidth(0).toFixed(2)};
    if(!__freeze) startTimeline();
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(rebuild); }
  addEventListener('resize', ()=>{ clearTimeout(window.__rb); window.__rb=setTimeout(rebuild,250); }, {passive:true});

  function ease(x){ return x<0?0:x>1?1:x*x*(3-2*x); }
  function resize(){ renderer.setSize(innerWidth,innerHeight); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); bgMat.uniforms.u_res.value.set(canvas.width,canvas.height); }
  addEventListener('resize',resize,{passive:true}); resize();
  if(reduce){ mat.uniforms.uAssemble.value=1; }

  let raf;
  function loop(){
    const now=performance.now()/1000, t=now-t0;
    bgMat.uniforms.u_time.value=now; bgMat.uniforms.u_mouse.value.copy(mouse);
    mat.uniforms.uTime.value=now; mat.uniforms.uMouse.value.copy(mWorld);
    // smooth tilt + spring-back repel
    tilt.lerp(tiltTarget,0.06); points.rotation.y=tilt.x; points.rotation.x=-tilt.y;
    mat.uniforms.uRepel.value += (repelTarget - mat.uniforms.uRepel.value)*0.08;
    if(!reduce && !__freeze && !userScrolled){
      mat.uniforms.uAssemble.value = ease(t/2.6);
      mat.uniforms.uDissolve.value = t<4.2 ? 0 : ease((t-4.2)/3.8)*0.55;
    }
    renderer.clear(); renderer.render(bgScene,bgCam); renderer.render(scene,cam);
    raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) cancelAnimationFrame(raf); else { raf=requestAnimationFrame(loop);} });
  window.__markScrolled=()=>{ userScrolled=true; }; // T5 hands control to scroll
}
</script>

<!-- ===================== UI: nav state + i18n ===================== -->
<script>
  // header solid after scroll
  const hdr=document.getElementById('hdr');
  addEventListener('scroll',()=>{ hdr.classList.toggle('solid', scrollY>40); },{passive:true});
  document.querySelectorAll('.nav-links a').forEach(a=>a.addEventListener('click',()=>document.body.classList.remove('mobile-open')));

  // i18n FR(default) · EN
  const I18N={ fr:{}, en:{
    nav_services:"Services", nav_process:"How it works", nav_about:"About", nav_contact:"Contact", nav_quote:"Free quote",
    hero_eyebrow:"Web studio · Luxembourg",
    hero_tagline:"We build websites that look like no one else's."
  }};
  const FR={};
  document.querySelectorAll('[data-i18n]').forEach(el=>{FR[el.getAttribute('data-i18n')]=el.textContent;});
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{FR['__h_'+el.getAttribute('data-i18n-html')]=el.innerHTML;});
  function setLang(l){
    const d=l==='fr'?null:I18N[l];
    document.documentElement.lang=l;
    document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');const v=d?d[k]:FR[k];if(v!=null)el.textContent=v;});
    document.querySelectorAll('[data-i18n-html]').forEach(el=>{const k=el.getAttribute('data-i18n-html');const v=d?d[k]:FR['__h_'+k];if(v!=null)el.innerHTML=v;});
    document.querySelectorAll('.lang-switch button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
    try{localStorage.setItem('webwerk_lang',l);}catch(e){}
  }
  window.setLang=setLang;
  document.querySelectorAll('.lang-switch button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
  let saved='fr'; try{saved=localStorage.getItem('webwerk_lang')||'fr';}catch(e){}
  if(saved!=='fr') setLang(saved);
</script>
</body>
</html>
